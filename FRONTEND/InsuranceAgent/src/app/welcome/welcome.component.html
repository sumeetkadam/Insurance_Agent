<div class="container vh-100 d-flex flex-column justify-content-center align-items-center">
    <div class="text-center mb-4">
        <h2 class="w-bold">Hello, Welcome</h2>
        <p> Select your language </p>
        <select class="form-select w-50">
            <option value="English">English</option>
            <option value="Spanish">Spanish</option>
            <option value="French">French</option>
        </select>
    </div>

    <div class="center-box mt-4 p-4">
        <form [formGroup]="userRoleForm" (ngSubmit)="onSubmit()" class="d-flex flex-column align-items-center w-100">
            <label class="mb-2 fw-bold">Select User Role:</label>
            <div class="d-flex flex-column w-100">
                <div *ngFor="let role of roles" class="form-check">
                    <input type="radio" [value]="role.agencyCode" id="{{role.agencyCode}}" formControlName="role"
                        class="form-check-input">
                    <label for="{{role.agencyCode}}" class="form-check-label">{{role.role}}</label>
                </div>
            </div>
            <button type="submit" [disabled]="!userRoleForm.valid" class="btn btn-primary mt-4 w-100">Get
                Started</button>
        </form>
    </div>
</div>
