<div class="container vh-100 d-flex flex-column justify-content-center align-items-center">
    <div class="center-box mt-4 p-4">
        <form [formGroup]="loginModeSelection" (ngSubmit)="onSubmit()" class="d-flex flex-column align-items-center w-100">
        <label class="fw-bold mb-2 text-center">Please choose your preferred login mode:</label>
    <div class="d-flex flex-column w-100">
        <div *ngFor = "let loginMode of loginModes"class="form-check">
            <input type="radio" [value]="loginMode.modeName" id="{{loginMode.modeName}}" formControlName="loginMode" class="form-check-input">
            <label for="{{loginMode.modeName}}" (click)="navigateToComponent(loginMode.id)" class="form-check-label">{{loginMode.modeName}}</label>
        </div>
    </div>
    <button type="submit" [disabled]="!loginModeSelection.valid" class="btn btn-primary mt-4 w-100"></button>
    </form>
    </div>

</div>
